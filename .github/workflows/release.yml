name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always

jobs:
  build:
    name: release / ${{ matrix.asset }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            asset: x86_64-unknown-linux-gnu
            bin: agenthub
          - os: macos-13
            asset: x86_64-apple-darwin
            bin: agenthub
          - os: macos-latest
            asset: aarch64-apple-darwin
            bin: agenthub
          - os: windows-latest
            asset: x86_64-pc-windows-msvc
            bin: agenthub.exe

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust
        uses: Swatinem/rust-cache@v2

      - name: Build
        run: cargo build --release --locked

      - name: Archive
        id: archive
        shell: bash
        run: |
          mkdir -p dist
          if [[ "$RUNNER_OS" == "Windows" ]]; then
            asset="agenthub-${{ matrix.asset }}.zip"
            powershell -NoLogo -NoProfile -Command "Compress-Archive -Path 'target/release/${{ matrix.bin }}' -DestinationPath 'dist/$asset' -Force"
          else
            asset="agenthub-${{ matrix.asset }}.tar.gz"
            tar -czf "dist/$asset" -C target/release "${{ matrix.bin }}"
          fi
          echo "asset=dist/$asset" >> "$GITHUB_OUTPUT"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: agenthub-${{ matrix.asset }}
          path: ${{ steps.archive.outputs.asset }}

      - name: Publish GitHub release asset
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ steps.archive.outputs.asset }}
