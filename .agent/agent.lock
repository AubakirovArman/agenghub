project:
  type: code
  stack: rust-cli
  language: rust
  package_manager: cargo

policies:
  preferred:
    cli_parser: clap
    serialization: serde
  forbidden: []

rulesets:
  - core.scope_only.v1
  - code.no_secret_leak.v1
  - code.reuse_first.v1

skills: {}

plugins:
  installed_lock: .agent/plugins/installed.json
  trust_model:
    - local
    - trusted
    - untrusted

enterprise:
  policy: .agent/enterprise/policy.yaml
  audit_log: .agent/enterprise/audit.jsonl
  compliance_reports: .agent/enterprise/

verifiers:
  default: code_build

commands:
  build: cargo build
  test: cargo test
