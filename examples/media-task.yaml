task:
  id: media_render_plan
  type: media.command
  title: Create a media render plan

workspace:
  type: media.git
  isolation: git_worktree

execution:
  commands:
    - mkdir -p media/renders
    - "printf '{\"scene\":\"intro\",\"format\":\"mp4\"}\\n' > media/manifest.json"
    - printf 'video-bytes\n' > media/renders/intro.mp4

scope:
  allow:
    - media/**
  deny:
    - .agent/**

verify:
  profile: media_render
  commands:
    - test -f media/manifest.json
    - test -f media/renders/intro.mp4

transaction:
  commit_on_success: true
  memory_promotion: on_success
  diff_limits:
    max_files_changed: 4
    max_lines_added: 10
    max_lines_deleted: 0
